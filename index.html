<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scene 1 - Tambang Emas VR</title>
  <script src="js/aframe.min.js"></script>
  <script src="js/aframe-environment-component.min.js"></script>
  <script src="js/components.js"></script>
</head>

<body>
  <a-scene environment="preset: goldmine; ground: flat; fog: 0.6">

    <a-assets timeout="5000">
      <img id="gambar-portal" src="assets/panorama.jpg">
    </a-assets>

    <a-camera position="0 1.6 0" wasd-controls="fly: false; acceleration: 30">
      <a-cursor fuse="true" fuse-timeout="5000" raycaster="objects: .clickable" color="#FFF"
        animation__fusing="property: scale; startEvents: fusing; easing: easeInCubic; dur: 2500; from: 1 1 1; to: 0.1 0.1 0.1"
        animation__mouseleave="property: scale; startEvents: mouseleave; easing: easeInCubic; dur: 500; to: 1 1 1">
      </a-cursor>
    </a-camera>

    <a-text value="Tatap objek lalu tunggu 5 detik untuk klik!" font="https://cdn.aframe.io/fonts/Roboto-msdf.json"
      color="#FFFFFF" position="0 3.5 -5" width="6" align="center" look-at-camera></a-text>

    <a-box color="#FFD700" position="-3 1.5 -5" class="clickable" spinner="speed: 0.05; axis: y"
      hover-color="hoverColor: #FFFFFF; originalColor: #FFD700"
      animation__click="property: scale; to: 1.5 1.5 1.5; startEvents: click; dur: 300; dir: alternate; loop: 1">
    </a-box>

    <a-sphere color="#CD853F" position="0 1.5 -5" radius="1.25" class="clickable" float="amplitude: 0.3; speed: 2"
      hover-color="hoverColor: #FFD166; originalColor: #CD853F"
      animation__spin="property: rotation; to: 0 360 0; startEvents: click; dur: 800; easing: easeOutBack">
    </a-sphere>

    <a-cylinder color="#8B6914" position="3 1.5 -5" radius="0.5" height="1.5" class="clickable"
      pulse="speed: 1.5; intensity: 1.1" hover-color="hoverColor: #FFD700; originalColor: #8B6914" gold-particles
      animation__click="property: scale; to: 1 0.5 1; startEvents: click; dur: 200; dir: alternate; loop: 1">
    </a-cylinder>

    <a-cone color="#F1C40F" position="5 1.5 -5" radius-bottom="0.5" height="1.5" class="clickable" blink="interval: 500"
      animation__rotate="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear"
      animation__color="property: components.material.material.color; type: color; startEvents: click; to: #E74C3C; dur: 500; dir: alternate">
    </a-cone>

    <a-link href="scene2.html" title="Masuk Scene 2" position="-1 1.6 2.5" image="#gambar-portal"
      class="clickable"></a-link>
    <a-link href="scene3-model.html" title="Masuk Scene 3" position="1 1.6 2.5" image="#gambar-portal"
      class="clickable"></a-link>

  </a-scene>
</body>

</html>
